name: Update aliae Formula

on:
  schedule:
    - cron: "*/30 * * * *"
  repository_dispatch:
    types: [aliae_release_published]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Get latest release from trajano/aliae
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'trajano',
              repo: 'aliae'
            });
            const tag = release.data.tag_name;
            const version = tag.startsWith('v') ? tag.slice(1) : tag;
            core.setOutput('tag', tag);
            core.setOutput('version', version);

      - name: Resolve release asset URLs
        id: assets
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.latest.outputs.tag }}';
            const release = await github.rest.repos.getReleaseByTag({
              owner: 'trajano',
              repo: 'aliae',
              tag
            });

            const byName = new Map(release.data.assets.map(a => [a.name, a.browser_download_url]));
            const sourceUrl = `https://github.com/trajano/aliae/archive/refs/tags/${tag}.tar.gz`;
            core.setOutput('source_url', sourceUrl);

            const assets = {
              darwin_amd64_url: 'aliae-darwin-amd64',
              darwin_arm64_url: 'aliae-darwin-arm64',
              linux_amd64_url: 'aliae-linux-amd64',
              linux_arm64_url: 'aliae-linux-arm64'
            };

            for (const [out, name] of Object.entries(assets)) {
              const url = byName.get(name);
              if (!url) {
                core.warning(`Missing release asset: ${name}; formula will fall back to source build for that platform.`);
                continue;
              }
              core.setOutput(out, url);
            }

      - name: Generate formula if version changed
        id: generate
        shell: bash
        run: |
          set -euo pipefail

          version='${{ steps.latest.outputs.version }}'
          tag='${{ steps.latest.outputs.tag }}'
          formula='Formula/aliae.rb'

          current_version=''
          if [[ -f "$formula" ]]; then
            current_version=$(sed -n 's/^  version "\(.*\)"$/\1/p' "$formula")
          fi

          if [[ "$current_version" == "$version" ]]; then
            echo "Formula already at $version"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          darwin_amd64_url='${{ steps.assets.outputs.darwin_amd64_url }}'
          darwin_arm64_url='${{ steps.assets.outputs.darwin_arm64_url }}'
          linux_amd64_url='${{ steps.assets.outputs.linux_amd64_url }}'
          linux_arm64_url='${{ steps.assets.outputs.linux_arm64_url }}'
          source_url='${{ steps.assets.outputs.source_url }}'

          sha256_url() {
            local url="$1"
            curl -fsSL "$url" | shasum -a 256 | awk '{print $1}'
          }

          darwin_amd64_sha=''
          darwin_arm64_sha=''
          linux_amd64_sha=''
          linux_arm64_sha=''
          source_sha=$(sha256_url "$source_url")

          [[ -n "$darwin_amd64_url" ]] && darwin_amd64_sha=$(sha256_url "$darwin_amd64_url")
          [[ -n "$darwin_arm64_url" ]] && darwin_arm64_sha=$(sha256_url "$darwin_arm64_url")
          [[ -n "$linux_amd64_url" ]] && linux_amd64_sha=$(sha256_url "$linux_amd64_url")
          [[ -n "$linux_arm64_url" ]] && linux_arm64_sha=$(sha256_url "$linux_arm64_url")

          needs_go='false'

          if [[ -n "$darwin_arm64_url" ]]; then
            darwin_arm64_stanza=$(cat <<EOF
                url "$darwin_arm64_url"
                sha256 "$darwin_arm64_sha"
EOF
)
          else
            needs_go='true'
            darwin_arm64_stanza=$(cat <<EOF
                url "$source_url"
                sha256 "$source_sha"
EOF
)
          fi

          if [[ -n "$darwin_amd64_url" ]]; then
            darwin_amd64_stanza=$(cat <<EOF
                url "$darwin_amd64_url"
                sha256 "$darwin_amd64_sha"
EOF
)
          else
            needs_go='true'
            darwin_amd64_stanza=$(cat <<EOF
                url "$source_url"
                sha256 "$source_sha"
EOF
)
          fi

          if [[ -n "$linux_arm64_url" ]]; then
            linux_arm64_stanza=$(cat <<EOF
                url "$linux_arm64_url"
                sha256 "$linux_arm64_sha"
EOF
)
          else
            needs_go='true'
            linux_arm64_stanza=$(cat <<EOF
                url "$source_url"
                sha256 "$source_sha"
EOF
)
          fi

          if [[ -n "$linux_amd64_url" ]]; then
            linux_amd64_stanza=$(cat <<EOF
                url "$linux_amd64_url"
                sha256 "$linux_amd64_sha"
EOF
)
          else
            needs_go='true'
            linux_amd64_stanza=$(cat <<EOF
                url "$source_url"
                sha256 "$source_sha"
EOF
)
          fi

          cat > "$formula" <<FORMULA
          class Aliae < Formula
            desc "Cross shell and platform alias management"
            homepage "https://aliae.dev"
            license "MIT"
            version "$version"
            head "https://github.com/trajano/aliae.git", branch: "master"
            depends_on "go" => :build

            on_macos do
              if Hardware::CPU.arm?
${darwin_arm64_stanza}
              else
${darwin_amd64_stanza}
              end
            end

            on_linux do
              if Hardware::CPU.arm?
${linux_arm64_stanza}
              else
${linux_amd64_stanza}
              end
            end

            resource "source" do
              url "$source_url"
              sha256 "$source_sha"
            end

            def install
              arch = if OS.mac? && Hardware::CPU.arm?
                "darwin-arm64"
              elsif OS.mac?
                "darwin-amd64"
              elsif OS.linux? && Hardware::CPU.arm?
                "linux-arm64"
              elsif OS.linux?
                "linux-amd64"
              end

              odie "Unsupported platform" if arch.nil?

              artifact = "aliae-#{arch}"
              if build.bottle? && File.exist?(artifact)
                bin.install artifact => "aliae"
              else
                source_root = buildpath
                unless (source_root/"src").directory?
                  source_root = buildpath/"_source"
                  resource("source").stage source_root
                end
                cd source_root/"src" do
                  system Formula["go"].opt_bin/"go", "build", *std_go_args(ldflags: "-s -w -X main.Version=#{version}")
                end
              end
            end

            test do
              system "#{bin}/aliae", "--help"
            end
          end
          FORMULA

          echo "updated formula to $tag"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit formula update
        if: steps.generate.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'feat: bump aliae formula to ${{ steps.latest.outputs.tag }}'
          file_pattern: Formula/aliae.rb
