name: Update aliae Formula

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Get latest release from trajano/aliae
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'trajano',
              repo: 'aliae'
            });
            const tag = release.data.tag_name;
            const version = tag.startsWith('v') ? tag.slice(1) : tag;
            core.setOutput('tag', tag);
            core.setOutput('version', version);

      - name: Resolve release asset URLs
        id: assets
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.latest.outputs.tag }}';
            const release = await github.rest.repos.getReleaseByTag({
              owner: 'trajano',
              repo: 'aliae',
              tag
            });

            const byName = new Map(release.data.assets.map(a => [a.name, a.browser_download_url]));
            const required = {
              darwin_amd64_url: 'aliae-darwin-amd64',
              darwin_arm64_url: 'aliae-darwin-arm64',
              linux_amd64_url: 'aliae-linux-amd64',
              linux_arm64_url: 'aliae-linux-arm64'
            };

            for (const [out, name] of Object.entries(required)) {
              const url = byName.get(name);
              if (!url) {
                core.setFailed(`Missing required release asset: ${name}`);
                return;
              }
              core.setOutput(out, url);
            }

      - name: Generate formula if version changed
        id: generate
        shell: bash
        run: |
          set -euo pipefail

          version='${{ steps.latest.outputs.version }}'
          tag='${{ steps.latest.outputs.tag }}'
          formula='Formula/aliae.rb'

          current_version=''
          if [[ -f "$formula" ]]; then
            current_version=$(sed -n 's/^  version "\(.*\)"$/\1/p' "$formula")
          fi

          if [[ "$current_version" == "$version" ]]; then
            echo "Formula already at $version"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          darwin_amd64_url='${{ steps.assets.outputs.darwin_amd64_url }}'
          darwin_arm64_url='${{ steps.assets.outputs.darwin_arm64_url }}'
          linux_amd64_url='${{ steps.assets.outputs.linux_amd64_url }}'
          linux_arm64_url='${{ steps.assets.outputs.linux_arm64_url }}'

          darwin_amd64_sha=$(curl -fsSL "$darwin_amd64_url" | shasum -a 256 | awk '{print $1}')
          darwin_arm64_sha=$(curl -fsSL "$darwin_arm64_url" | shasum -a 256 | awk '{print $1}')
          linux_amd64_sha=$(curl -fsSL "$linux_amd64_url" | shasum -a 256 | awk '{print $1}')
          linux_arm64_sha=$(curl -fsSL "$linux_arm64_url" | shasum -a 256 | awk '{print $1}')

          cat > "$formula" <<FORMULA
          class Aliae < Formula
            desc "Cross shell and platform alias management"
            homepage "https://aliae.dev"
            license "MIT"
            version "$version"
            head "https://github.com/trajano/aliae.git", branch: "master"

            on_macos do
              if Hardware::CPU.arm?
                url "$darwin_arm64_url"
                sha256 "$darwin_arm64_sha"
              else
                url "$darwin_amd64_url"
                sha256 "$darwin_amd64_sha"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$linux_arm64_url"
                sha256 "$linux_arm64_sha"
              else
                url "$linux_amd64_url"
                sha256 "$linux_amd64_sha"
              end
            end

            def install
              arch = if OS.mac? && Hardware::CPU.arm?
                "darwin-arm64"
              elsif OS.mac?
                "darwin-amd64"
              elsif OS.linux? && Hardware::CPU.arm?
                "linux-arm64"
              elsif OS.linux?
                "linux-amd64"
              end

              odie "Unsupported platform" if arch.nil?

              bin.install "aliae-#{arch}" => "aliae"
            end

            test do
              system "#{bin}/aliae", "--help"
            end
          end
          FORMULA

          echo "updated formula to $tag"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit formula update
        if: steps.generate.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'feat: bump aliae formula to ${{ steps.latest.outputs.tag }}'
          file_pattern: Formula/aliae.rb
